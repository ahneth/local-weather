<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Weather Radar</title>
    <!-- Stable Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for clean UI while maintaining scroll functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex justify-center">

    <!-- Mobile Container (Simulates phone viewport constraint) -->
    <div class="w-full max-w-md bg-slate-900 min-h-screen h-screen shadow-2xl flex flex-col p-5 relative overflow-hidden">
        
        <!-- Loading / Permission Screen -->
        <div id="loading-screen" class="absolute inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6 text-center transition-opacity duration-300">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <h2 class="text-xl font-bold mb-2">Locating You...</h2>
            <p class="text-sm text-slate-400">Please allow location access when prompted by your browser to see your local forecast.</p>
            <p id="error-message" class="text-red-400 mt-4 text-sm hidden"></p>
        </div>

        <!-- Header -->
        <header class="mb-4 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-black tracking-tight text-white flex items-center gap-2">
                    📍 Local Weather
                </h1>
                <p id="coords-display" class="text-[11px] text-slate-400 mt-0.5">Fetching coordinates...</p>
            </div>
            <div id="current-badge" class="bg-blue-600/20 text-blue-400 text-[11px] px-2.5 py-1 rounded-full font-semibold border border-blue-500/30">
                Live GPS
            </div>
        </header>

        <!-- Current Weather Hero Card -->
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 shadow-lg mb-4 flex items-center justify-between shrink-0">
            <div>
                <p class="text-xs font-medium text-blue-100 uppercase tracking-wider">Right Now</p>
                <h2 id="current-temp" class="text-4xl font-extrabold mt-1 text-white">--°C</h2>
                <p id="current-condition" class="text-sm text-blue-100 mt-0.5 font-medium">Loading summary...</p>
            </div>
            <div id="current-emoji" class="text-5xl drop-shadow-md">⏳</div>
        </div>

        <!-- Segmented Toggle Control -->
        <div class="bg-slate-950/60 p-1 rounded-xl flex mb-4 border border-slate-800 shrink-0">
            <button id="toggle-12h" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 bg-blue-600 text-white shadow-md">
                Next 12 Hours
            </button>
            <button id="toggle-7d" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200">
                Next 7 Days
            </button>
        </div>

        <!-- Forecast Dynamic Container -->
        <main class="flex-1 min-h-0">
            <!-- 12 Hours Panel (Vertical List with Fixed Height + Internal Scroll) -->
            <div id="panel-12h" class="space-y-2 max-h-[340px] overflow-y-auto no-scrollbar pr-1">
                <!-- Data dynamically injected here -->
            </div>

            <!-- 7 Days Panel (Super Compact Vertical List to prevent page scroll) -->
            <div id="panel-7d" class="space-y-1.5 hidden">
                <!-- Data dynamically injected here -->
            </div>
        </main>
        
        <footer class="mt-auto pt-4 text-center text-[10px] text-slate-500 font-medium shrink-0">
            Powered by Open-Meteo API
        </footer>
    </div>

    <!-- Application Logic -->
    <script>
        let weatherData = null;

        function interpretWeather(code) {
            const mapping = {
                0: { emoji: '☀️', desc: 'Clear Sky' },
                1: { emoji: '🌤️', desc: 'Mainly Clear' },
                2: { emoji: '⛅', desc: 'Partly Cloudy' },
                3: { emoji: '☁️', desc: 'Overcast' },
                45: { emoji: '🌫️', desc: 'Foggy' },
                48: { emoji: '🌫️', desc: 'Rime Fog' },
                51: { emoji: '🌧️', desc: 'Light Drizzle' },
                53: { emoji: '🌧️', desc: 'Mod. Drizzle' },
                55: { emoji: '🌧️', desc: 'Dense Drizzle' },
                61: { emoji: '🌦️', desc: 'Slight Rain' },
                63: { emoji: '🌧️', desc: 'Moderate Rain' },
                65: { emoji: '🌧️', desc: 'Heavy Rain' },
                71: { emoji: '❄️', desc: 'Slight Snow' },
                73: { emoji: '❄️', desc: 'Moderate Snow' },
                75: { emoji: '❄️', desc: 'Heavy Snow' },
                80: { emoji: '🌦️', desc: 'Light Showers' },
                81: { emoji: '🌧️', desc: 'Mod. Showers' },
                82: { emoji: '⛈️', desc: 'Heavy Showers' },
                95: { emoji: '⛈️', desc: 'Thunderstorm' },
                96: { emoji: '⛈️', desc: 'Storm + Hail' }
            };
            return mapping[code] || { emoji: '✨', desc: 'Variable' };
        }

        window.addEventListener('DOMContentLoaded', () => {
            setupToggleButtons();
            
            if ("geolocation" in navigator) {
                requestLocation();
            } else {
                showError("Geolocation setup is completely unsupported by this device browser.");
            }
        });

        function requestLocation() {
            const successCallback = async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // Keep coordinates as a temporary placeholder while fetching the real name
                document.getElementById('coords-display').innerText = `Lat: ${lat.toFixed(4)} / Lon: ${lon.toFixed(4)}`;
                
                // Fire both API requests simultaneously to save loading time
                await Promise.all([
                    fetchWeather(lat, lon),
                    fetchLocationName(lat, lon)
                ]);
            };

            const errorCallback = (error) => {
                // Error code 3 represents a TIMEOUT
                if (error.code === 3) {
                    // Fallback: Try again without requesting high accuracy GPS
                    navigator.geolocation.getCurrentPosition(
                        successCallback,
                        (fallbackError) => {
                            showError(`Location Failed: ${fallbackError.message}.`);
                        },
                        { enableHighAccuracy: false, timeout: 15000, maximumAge: 300000 } // Allowed to use older, cached approximate location
                    );
                } else {
                    // Handles actual user denials (Error code 1)
                    showError(`Location Denied: ${error.message}. Please check site settings permissions.`);
                }
            };

            // Attempt 1: Try high accuracy with a shorter 6-second timeout
            navigator.geolocation.getCurrentPosition(
                successCallback,
                errorCallback,
                { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
            );
        }

        function setupToggleButtons() {
            const btn12h = document.getElementById('toggle-12h');
            const btn7d = document.getElementById('toggle-7d');
            const panel12h = document.getElementById('panel-12h');
            const panel7d = document.getElementById('panel-7d');

            btn12h.addEventListener('click', () => {
                btn12h.className = "flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 bg-blue-600 text-white shadow-md";
                btn7d.className = "flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200";
                panel12h.classList.remove('hidden');
                panel7d.classList.add('hidden');
            });

            btn7d.addEventListener('click', () => {
                btn7d.className = "flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 bg-blue-600 text-white shadow-md";
                btn12h.className = "flex-1 py-2.5 text-xs font-bold rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200";
                panel7d.classList.remove('hidden');
                panel12h.classList.add('hidden');
            });
        }

        async function fetchLocationName(lat, lon) {
            // OpenStreetMap's free reverse geocoding endpoint
            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.address) {
                    const addr = data.address;
                    // Cascade from most specific local area to broader city
                    const localName = addr.neighbourhood || addr.suburb || addr.city_district || addr.city || addr.town || addr.village;
                    const regionName = addr.city || addr.state || addr.country;
                    
                    // If localName and regionName are the same, just show one
                    if (localName === regionName) {
                        document.getElementById('coords-display').innerText = localName;
                    } else {
                        document.getElementById('coords-display').innerText = `${localName}, ${regionName}`;
                    }
                }
            } catch (err) {
                console.warn("Could not fetch location name, falling back to coordinates.");
                // Keep the coordinates displayed if the API fails
            }
        }

        async function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorDetails = await response.json();
                    throw new Error(`API Error: ${errorDetails.reason || response.statusText}`);
                }
                
                weatherData = await response.json();
                
                // Remove loading screen block smoothly
                document.getElementById('loading-screen').classList.add('opacity-0', 'pointer-events-none');
                
                renderCurrentWeather();
                renderHourlyForecast();
                renderDailyForecast();
                
            } catch (err) {
                showError(err.message);
            }
        }

        function renderCurrentWeather() {
            const current = weatherData.current;
            const status = interpretWeather(current.weather_code);
            
            document.getElementById('current-temp').innerText = `${Math.round(current.temperature_2m)}°C`;
            document.getElementById('current-condition').innerText = status.desc;
            document.getElementById('current-emoji').innerText = status.emoji;
        }

        function renderHourlyForecast() {
            const panel = document.getElementById('panel-12h');
            panel.innerHTML = ''; 
            
            // Generate clean local string timeline sync
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const currentHourStr = `${year}-${month}-${day}T${hour}:00`;

            let startIndex = weatherData.hourly.time.findIndex(t => t.startsWith(currentHourStr));
            if (startIndex === -1) startIndex = 0; 

            for (let i = startIndex; i < startIndex + 12; i++) {
                if (!weatherData.hourly.time[i]) break;

                const timeStr = weatherData.hourly.time[i];
                const temp = weatherData.hourly.temperature_2m[i];
                const code = weatherData.hourly.weather_code[i];
                
                const dateObj = new Date(timeStr);
                let hourFormatted = dateObj.toLocaleTimeString([], { hour: '2-digit', hour12: true });

                if (i === startIndex) hourFormatted = "Now";

                const weather = interpretWeather(code);

                const card = document.createElement('div');
                // Redesigned as sleek list rows instead of horizontal blocks
                card.className = "bg-slate-800/40 border border-slate-800/50 py-2.5 px-4 rounded-xl flex items-center justify-between";
                card.innerHTML = `
                    <span class="text-xs font-bold text-slate-300 w-16 text-left">${hourFormatted}</span>
                    <div class="flex items-center gap-2.5 flex-1 justify-start ml-2">
                        <span class="text-xl">${weather.emoji}</span>
                        <span class="text-xs text-slate-400 font-medium truncate max-w-[120px]">${weather.desc}</span>
                    </div>
                    <span class="text-xs font-black text-white">${Math.round(temp)}°C</span>
                `;
                panel.appendChild(card);
            }
        }

        function renderDailyForecast() {
            const panel = document.getElementById('panel-7d');
            panel.innerHTML = ''; 
            
            const daysData = weatherData.daily;

            for (let i = 0; i < daysData.time.length; i++) {
                const rawDate = daysData.time[i];
                const maxTemp = daysData.temperature_2m_max[i];
                const minTemp = daysData.temperature_2m_min[i];
                const code = daysData.weather_code[i];

                const dateObj = new Date(rawDate);
                let dayName = dateObj.toLocaleDateString([], { weekday: 'short' });
                let dayNumeric = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });

                if (i === 0) dayName = "Today";

                const weather = interpretWeather(code);

                const element = document.createElement('div');
                // Super compact padding (py-2) ensures all 7 entries fit perfectly inside the phone view window
                element.className = "bg-slate-800/40 border border-slate-800/50 py-2 px-4 rounded-xl flex items-center justify-between";
                element.innerHTML = `
                    <div class="flex flex-col w-14">
                        <span class="text-xs font-bold text-white">${dayName}</span>
                        <span class="text-[10px] text-slate-500 font-medium">${dayNumeric}</span>
                    </div>
                    <div class="flex items-center gap-2.5 flex-1 justify-start ml-2">
                        <span class="text-xl">${weather.emoji}</span>
                        <span class="text-xs text-slate-400 font-medium truncate max-w-[120px]">${weather.desc}</span>
                    </div>
                    <div class="text-right text-xs">
                        <span class="font-bold text-white">${Math.round(maxTemp)}°</span>
                        <span class="font-semibold text-slate-500 ml-1.5">${Math.round(minTemp)}°</span>
                    </div>
                `;
                panel.appendChild(element);
            }
        }

        function showError(msg) {
            const errEl = document.getElementById('error-message');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
            const loader = document.querySelector('#loading-screen .animate-spin');
            if (loader) loader.remove();
        }
    </script>
</body>
</html>
