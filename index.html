<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Weather Radar</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex justify-center">

    <!-- Mobile Container (Simulates mobile viewport constraint on desktop) -->
    <div class="w-full max-w-md bg-slate-900 min-h-screen shadow-2xl flex flex-col p-6 relative overflow-hidden">
        
        <!-- Loading / Permission Screen -->
        <div id="loading-screen" class="absolute inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6 text-center transition-opacity duration-300">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <h2 class="text-xl font-bold mb-2">Locating You...</h2>
            <p class="text-sm text-slate-400">Please allow location access when prompted by your browser to see your local forecast.</p>
            <p id="error-message" class="text-red-400 mt-4 text-sm hidden"></p>
        </div>

        <!-- Header -->
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                    📍 Local Weather
                </h1>
                <p id="coords-display" class="text-xs text-slate-400 mt-1">Fetching coordinates...</p>
            </div>
            <div id="current-badge" class="bg-blue-600/20 text-blue-400 text-xs px-3 py-1.5 rounded-full font-semibold border border-blue-500/30">
                Live GPS
            </div>
        </header>

        <!-- Current Weather Hero Card -->
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 shadow-lg mb-6 flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-blue-100 uppercase tracking-wider">Right Now</p>
                <h2 id="current-temp" class="text-5xl font-extrabold mt-2 text-white">--°C</h2>
                <p id="current-condition" class="text-base text-blue-100 mt-1 font-medium">Loading summary...</p>
            </div>
            <div id="current-emoji" class="text-6xl drop-shadow-md">⏳</div>
        </div>

        <!-- Segmented Toggle Control -->
        <div class="bg-slate-950/60 p-1 rounded-2xl flex mb-6 border border-slate-800">
            <button id="toggle-12h" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 bg-blue-600 text-white shadow-md">
                Next 12 Hours
            </button>
            <button id="toggle-7d" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 text-slate-400 hover:text-slate-200">
                Next 7 Days
            </button>
        </div>

        <!-- Forecast Dynamic Container -->
        <main class="flex-1">
            <!-- 12 Hours Panel (Horizontal Scroll Layout) -->
            <div id="panel-12h" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                <!-- JavaScript injects elements here -->
            </div>

            <!-- 7 Days Panel (Vertical List Layout, Hidden by default) -->
            <div id="panel-7d" class="space-y-3 hidden">
                <!-- JavaScript injects elements here -->
            </div>
        </main>
        
        <footer class="mt-auto pt-6 text-center text-xs text-slate-500 font-medium">
            Powered by Open-Meteo API
        </footer>
    </div>

    <!-- Application Logic -->
    <script>
        // Global state tracking
        let weatherData = null;
        let activeTab = '12h';

        // Mapping WMO Weather Codes to beautiful Emojis and descriptions
        // Reference: https://open-meteo.com/en/docs
        function interpretWeather(code) {
            const mapping = {
                0: { emoji: '☀️', desc: 'Clear Sky' },
                1: { emoji: '🌤️', desc: 'Mainly Clear' },
                2: { emoji: '⛅', desc: 'Partly Cloudy' },
                3: { emoji: '☁️', desc: 'Overcast' },
                45: { emoji: '🌫️', desc: 'Foggy' },
                48: { emoji: '🌫️', desc: 'Depositing Rime Fog' },
                51: { emoji: '🌧️', desc: 'Light Drizzle' },
                53: { emoji: '🌧️', desc: 'Moderate Drizzle' },
                55: { emoji: '🌧️', desc: 'Dense Drizzle' },
                61: { emoji: '🌦️', desc: 'Slight Rain' },
                63: { emoji: '🌧️', desc: 'Moderate Rain' },
                65: { emoji: '🌧️', desc: 'Heavy Rain' },
                71: { emoji: '❄️', desc: 'Slight Snow' },
                73: { emoji: '❄️', desc: 'Moderate Snow' },
                75: { emoji: '❄️', desc: 'Heavy Snow' },
                80: { emoji: '🌦️', desc: 'Slight Rain Showers' },
                81: { emoji: '🌧️', desc: 'Moderate Rain Showers' },
                82: { emoji: '⛈️', desc: 'Violent Rain Showers' },
                95: { emoji: '⛈️', desc: 'Thunderstorm' },
                96: { emoji: '⛈️', desc: 'Thunderstorm with Hail' }
            };
            return mapping[code] || { emoji: '✨', desc: 'Variable' };
        }

        // Initialize Geolocation Request on Load
        window.addEventListener('DOMContentLoaded', () => {
            setupToggleButtons();
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        // Display clean coordinates up to 4 decimals
                        document.getElementById('coords-display').innerText = `Lat: ${lat.toFixed(4)} / Lon: ${lon.toFixed(4)}`;
                        
                        await fetchWeather(lat, lon);
                    },
                    (error) => {
                        showError(`Location Denied: ${error.message}. Please unlock location access permissions in your browser configurations.`);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                showError("Geolocation is completely unsupported by this legacy browser variant.");
            }
        });

        // Set up tab clicking interactions
        function setupToggleButtons() {
            const btn12h = document.getElementById('toggle-12h');
            const btn7d = document.getElementById('toggle-7d');
            const panel12h = document.getElementById('panel-12h');
            const panel7d = document.getElementById('panel-7d');

            btn12h.addEventListener('click', () => {
                activeTab = '12h';
                btn12h.className = "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 bg-blue-600 text-white shadow-md";
                btn7d.className = "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 text-slate-400 hover:text-slate-200";
                panel12h.classList.remove('hidden');
                panel7d.classList.add('hidden');
            });

            btn7d.addEventListener('click', () => {
                activeTab = '7d';
                btn7d.className = "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 bg-blue-600 text-white shadow-md";
                btn12h.className = "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 text-slate-400 hover:text-slate-200";
                panel7d.classList.remove('hidden');
                panel12h.classList.add('hidden');
            });
        }

        // API Async Data Fetch Operation
        async function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Weather API communications breakdown.");
                
                weatherData = await response.json();
                
                // Hide landing splash screen wrapper smoothly
                document.getElementById('loading-screen').classList.add('opacity-0', 'pointer-events-none');
                
                renderCurrentWeather();
                renderHourlyForecast();
                renderDailyForecast();
                
            } catch (err) {
                showError(err.message);
            }
        }

        // Populate Current Weather Elements
        function renderCurrentWeather() {
            const current = weatherData.current;
            const status = interpretWeather(current.weather_code);
            
            document.getElementById('current-temp').innerText = `${Math.round(current.temperature_2m)}°C`;
            document.getElementById('current-condition').innerText = status.desc;
            document.getElementById('current-emoji').innerText = status.emoji;
        }

        // Render Horizontal Scroll List for the Next 12 Hours
        function renderHourlyForecast() {
            const panel = document.getElementById('panel-12h');
            panel.innerHTML = ''; // clear loading skeleton
            
            // Sync dynamically with the client browser's closest current hour array match
            const now = new Date();
            const currentHourISO = new Date(now.setMinutes(0,0,0)).toISOString().slice(0, 13);
            
            letstartIndex = weatherData.hourly.time.findIndex(t => t.startsWith(currentHourISO));
            if (startIndex === -1) startIndex = 0; // Fallback edgecase protection

            for (let i = startIndex; i < startIndex + 12; i++) {
                if (!weatherData.hourly.time[i]) break;

                const timeStr = weatherData.hourly.time[i];
                const temp = weatherData.hourly.temperature_2m[i];
                const code = weatherData.hourly.weather_code[i];
                
                const dateObj = new Date(timeStr);
                let hourFormatted = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

                // Simplify label for the immediate entry block
                if (i === startIndex) hourFormatted = "Now";

                const weather = interpretWeather(code);

                const card = document.createElement('div');
                card.className = "bg-slate-800/50 border border-slate-800 p-4 rounded-2xl flex flex-col items-center min-w-[76px] text-center snap-center flex-shrink-0";
                card.innerHTML = `
                    <span class="text-xs text-slate-400 font-medium">${hourFormatted}</span>
                    <span class="text-2xl my-2 drop-shadow-sm">${weather.emoji}</span>
                    <span class="text-sm font-bold text-white">${Math.round(temp)}°C</span>
                `;
                panel.appendChild(card);
            }
        }

        // Render Vertical Stack Cards List for the Next 7 Days
        function renderDailyForecast() {
            const panel = document.getElementById('panel-7d');
            panel.innerHTML = ''; // clean up container structure
            
            const daysData = weatherData.daily;

            for (let i = 0; i < daysData.time.length; i++) {
                const rawDate = daysData.time[i];
                const maxTemp = daysData.temperature_2m_max[i];
                const minTemp = daysData.temperature_2m_min[i];
                const code = daysData.weather_code[i];

                const dateObj = new Date(rawDate);
                let dayName = dateObj.toLocaleDateString([], { weekday: 'short' });
                let dayNumeric = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });

                // Rename relative values to maintain a streamlined layout
                if (i === 0) dayName = "Today";

                const weather = interpretWeather(code);

                const element = document.createElement('div');
                element.className = "bg-slate-800/40 border border-slate-800/60 p-4 rounded-2xl flex items-center justify-between";
                element.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-white">${dayName}</span>
                        <span class="text-xs text-slate-500 font-medium">${dayNumeric}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${weather.emoji}</span>
                        <span class="text-xs text-slate-400 font-medium hidden sm:inline w-20 text-right">${weather.desc}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-white">${Math.round(maxTemp)}°</span>
                        <span class="text-sm font-semibold text-slate-500 ml-1">${Math.round(minTemp)}°</span>
                    </div>
                `;
                panel.appendChild(element);
            }
        }

        // Handle structural error fallback scenarios cleanly
        function showError(msg) {
            const errEl = document.getElementById('error-message');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
            // Remove the spinning loader graphic
            const loader = document.querySelector('#loading-screen .animate-spin');
            if (loader) loader.remove();
        }
    </script>
</body>
</html>
